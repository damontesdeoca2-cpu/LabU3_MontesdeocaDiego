<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio DOM - Registro de Estudiantes</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="main-wrapper">
    <div class="container" style="max-width: 960px;">
      <div class="card-main" id="mainCard">

        <div class="card-header-custom">
          <div class="icon-circle">
            <i class="fas fa-user-graduate"></i>
          </div>
          <div>
            <h1>Registro de Estudiantes</h1>
            <p>Gestione los registros de forma dinámica con manipulación del DOM</p>
          </div>
        </div>

        <div class="card-body-custom">

          <!-- Formulario -->
          <div class="row g-3">
            <div class="col-md-4">
              <label for="nombre" class="form-label">
                <i class="fas fa-user me-1"></i>Nombre completo
              </label>
              <input id="nombre" type="text" class="form-control" placeholder="Ej: Carlos Mendoza">
            </div>
            <div class="col-md-4">
              <label for="carrera" class="form-label">
                <i class="fas fa-laptop-code me-1"></i>Carrera
              </label>
              <select id="carrera" class="form-select">
                <option value="">Seleccione...</option>
                <option value="Tecnologías de la Información">Tecnologías de la Información</option>
                <option value="Software">Software</option>
                <option value="Sistemas">Sistemas</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="semestre" class="form-label">
                <i class="fas fa-calendar-alt me-1"></i>Semestre
              </label>
              <input id="semestre" type="number" class="form-control" min="1" max="10" placeholder="1-10">
            </div>
          </div>

          <div class="mt-4 d-flex gap-2">
            <button id="btnAgregar" class="btn btn-accent">
              <i class="fas fa-plus me-1"></i>Agregar estudiante
            </button>
            <button id="btnLimpiar" class="btn btn-outline-custom">
              <i class="fas fa-trash-alt me-1"></i>Limpiar tabla
            </button>
          </div>

          <div id="mensaje" class="alert mt-3 d-none"></div>

          <!-- Estadísticas -->
          <div class="stats-bar mt-4">
            <div class="stat-icon">
              <i class="fas fa-users"></i>
            </div>
            <div>
              <div class="stat-text">Total de estudiantes registrados</div>
              <div class="stat-number" id="totalEstudiantes">0</div>
            </div>
          </div>

          <hr class="section-divider">

          <!-- Buscador y Filtros -->
          <div class="row g-3">
            <div class="col-md-5">
              <label for="buscarTexto" class="form-label">
                <i class="fas fa-search me-1"></i>Buscar estudiante
              </label>
              <div class="input-group">
                <input id="buscarTexto" type="text" class="form-control" placeholder="Nombre, carrera o semestre...">
                <button id="btnBuscar" class="btn btn-accent" style="border-top-left-radius:0;border-bottom-left-radius:0;">
                  <i class="fas fa-search"></i>
                </button>
                <button id="btnLimpiarBusqueda" class="btn btn-outline-custom" style="border-top-left-radius:0;border-bottom-left-radius:0;">
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
            <div class="col-md-5">
              <label for="filtroCarrera" class="form-label">
                <i class="fas fa-filter me-1"></i>Filtrar por carrera
              </label>
              <div class="input-group">
                <select id="filtroCarrera" class="form-select">
                  <option value="Todas">Todas las carreras</option>
                  <option value="Tecnologías de la Información">Tecnologías de la Información</option>
                  <option value="Software">Software</option>
                  <option value="Sistemas">Sistemas</option>
                </select>
                <button id="btnFiltrar" class="btn btn-accent" style="border-top-left-radius:0;border-bottom-left-radius:0;">
                  <i class="fas fa-filter"></i>
                </button>
              </div>
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <button id="btnVerJSON" class="btn btn-dark-custom w-100">
                <i class="fas fa-code me-1"></i>JSON
              </button>
            </div>
          </div>

          <hr class="section-divider">

          <!-- Tabla -->
          <div class="table-responsive">
            <table class="table table-dark-custom mb-0">
              <thead>
                <tr>
                  <th style="width:50px;">#</th>
                  <th>Nombre</th>
                  <th>Carrera</th>
                  <th style="width:100px;">Semestre</th>
                  <th style="width:220px;">Acciones</th>
                </tr>
              </thead>
              <tbody id="cuerpoTabla">
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Modal JSON -->
  <div class="modal fade" id="modalJSON" tabindex="-1" aria-labelledby="modalJSONLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalJSONLabel">
            <i class="fas fa-code me-2"></i>JSON de estudiantes
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <pre id="contenidoJSON" class="json-display"></pre>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-custom" data-bs-dismiss="modal">
            <i class="fas fa-times me-1"></i>Cerrar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
